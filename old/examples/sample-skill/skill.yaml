# SocialHub.AI Skill Manifest
# This is a sample skill demonstrating the skill specification format

name: "data-export-plus"
version: "1.0.0"
display_name: "高级数据导出"
description: "支持更多格式的数据导出，包括 Parquet、Feather、JSON Lines 等"
author: "SocialHub Official"
license: "MIT"
homepage: "https://skills.socialhub.ai/data-export-plus"

# 分类: data, marketing, analytics, integration, utility
category: "data"

tags:
  - export
  - parquet
  - feather
  - data-format

# 兼容性要求
compatibility:
  cli_version: ">=0.1.0"
  python_version: ">=3.10"

# 依赖
dependencies:
  python:
    - pyarrow>=14.0.0
  skills: []

# 权限声明
# 可选值: file:read, file:write, network:local, network:internet,
#        data:read, data:write, config:read, config:write, execute
permissions:
  - file:write
  - data:read

# 入口文件
entrypoint: "main.py"

# 提供的命令
commands:
  - name: "export-parquet"
    description: "导出数据为 Parquet 格式"
    function: "export_parquet"
    arguments:
      - name: "source"
        type: "string"
        required: true
        description: "数据源 (customers, orders, segments)"
      - name: "output"
        type: "string"
        required: true
        description: "输出文件路径"

  - name: "export-jsonl"
    description: "导出数据为 JSON Lines 格式"
    function: "export_jsonl"
    arguments:
      - name: "source"
        type: "string"
        required: true
      - name: "output"
        type: "string"
        required: true

