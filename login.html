<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Skills Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body data-page="login">
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="SocialHub.AI" class="logo-img">
                <span class="nav-divider">|</span>
                <span class="nav-subtitle">Store Access</span>
            </div>
        </div>
    </nav>

    <main class="auth-shell">
        <section class="auth-panel">
            <div class="auth-copy">
                <p class="section-kicker">Store entry</p>
                <h1>Sign in to continue from the storefront</h1>
                <p>This entry point is for store users who browse skills, evaluate releases, and copy CLI install commands. Developer and admin access use separate sign-in pages.</p>
            </div>
            <div class="auth-card">
                <h2>Store sign in</h2>
                <form id="loginForm" class="console-form">
                    <label>Email<input type="email" name="email" required></label>
                    <label>Password<input type="password" name="password" minlength="8" required></label>
                    <button class="btn btn-primary btn-block" type="submit">Continue to the store</button>
                </form>
            </div>
        </section>
    </main>

    <div class="console-toast" id="toast"></div>
    <script src="app.js"></script>
</body>
</html>
