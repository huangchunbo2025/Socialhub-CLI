apiVersion: apps/v1
kind: Deployment
metadata:
  name: socialhub-skills-store
  labels:
    app.kubernetes.io/name: socialhub-skills-store
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: socialhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: socialhub-skills-store
  template:
    metadata:
      labels:
        app.kubernetes.io/name: socialhub-skills-store
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: socialhub
    spec:
      serviceAccountName: socialhub
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: harbor-registry-conf
      containers:
        - name: skills-store
          image: harbor.easesaas.com/marpro/socialhub-skills-store:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 10000
              protocol: TCP
          env:
            # 数据库（skills_store 库）
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: socialhub-secret
                  key: SKILLS_DATABASE_URL
            - name: ALEMBIC_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: socialhub-secret
                  key: SKILLS_ALEMBIC_DATABASE_URL
            # 认证
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: socialhub-secret
                  key: SKILLS_JWT_SECRET
            # 初始管理员账号
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: socialhub-secret
                  key: SKILLS_ADMIN_EMAIL
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: socialhub-secret
                  key: SKILLS_ADMIN_PASSWORD
            # 应用配置
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: socialhub-config
                  key: APP_ENV
            - name: JWT_EXPIRE_HOURS
              valueFrom:
                configMapKeyRef:
                  name: socialhub-config
                  key: JWT_EXPIRE_HOURS
            - name: PACKAGE_STORAGE_MODE
              valueFrom:
                configMapKeyRef:
                  name: socialhub-config
                  key: PACKAGE_STORAGE_MODE
            - name: PACKAGE_STORAGE_ROOT
              valueFrom:
                configMapKeyRef:
                  name: socialhub-config
                  key: PACKAGE_STORAGE_ROOT
            - name: ED25519_PRIVATE_KEY_PATH
              valueFrom:
                configMapKeyRef:
                  name: socialhub-config
                  key: ED25519_PRIVATE_KEY_PATH
            - name: ED25519_PUBLIC_KEY_ID
              valueFrom:
                configMapKeyRef:
                  name: socialhub-config
                  key: ED25519_PUBLIC_KEY_ID
          volumeMounts:
            - name: packages
              mountPath: /app/data/packages
            - name: secrets-vol
              mountPath: /app/secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: packages
          persistentVolumeClaim:
            claimName: skills-store-packages
        - name: secrets-vol
          persistentVolumeClaim:
            claimName: skills-store-secrets-vol